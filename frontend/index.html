<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MovieVerse</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="logo">MovieVerse</div>

    <div class="nav-links">
      <a href="index.html" class="active">Home</a>
      <a href="favorites.html">Favorites</a>
    </div>
  </nav>

  <div class="app">

    <!-- HERO + SEARCH -->
    <section class="hero">
      <div class="hero-content">
        <h1>Discover your next favorite movie</h1>
        <p>Search across thousands of titles powered by TMDB.</p>
      </div>

      <div class="search-bar">
        <input type="text" id="searchInput" placeholder="Search for a movie...">
        <button id="searchBtn">Search</button>
      </div>

      <div id="suggestions" class="suggestions"></div>
    </section>

    <!-- ROWS -->
    <section class="results-section">
      <h2 class="section-title">Trending Now</h2>
      <div class="card-grid" id="trendingRow"></div>
      <button class="scroll-btn left" onclick="scrollRow('trendingRow', -400)">‹</button>
<button class="scroll-btn right" onclick="scrollRow('trendingRow', 400)">›</button>

    </section>

    <section class="results-section">
      <h2 class="section-title">Popular</h2>
      <div class="card-grid" id="popularRow"></div>
      <button class="scroll-btn left" onclick="scrollRow('trendingRow', -400)">‹</button>
<button class="scroll-btn right" onclick="scrollRow('trendingRow', 400)">›</button>

    </section>

    <section class="results-section">
      <h2 class="section-title">Top Rated</h2>
      <div class="card-grid" id="topRatedRow"></div>
      <button class="scroll-btn left" onclick="scrollRow('trendingRow', -400)">‹</button>
<button class="scroll-btn right" onclick="scrollRow('trendingRow', 400)">›</button>

    </section>

  </div>

  <script src="app.js"></script>
</body>
</html>
